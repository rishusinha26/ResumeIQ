services:
  mongo:
    image: mongo:7
    container_name: ats_genai_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: ats_genai_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=${MONGO_DB}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SPACY_MODEL=${SPACY_MODEL}
      - SENTENCE_TRANSFORMER_MODEL=${SENTENCE_TRANSFORMER_MODEL}
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    container_name: ats_genai_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=${FRONTEND_API_BASE_URL}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
