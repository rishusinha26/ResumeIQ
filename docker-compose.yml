services:
  mongo:
    image: mongo:7
    container_name: ats_genai_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: ats_genai_piston
    restart: unless-stopped
    privileged: true
    ports:
      - "2000:2000"
    environment:
      - PISTON_API_PORT=2000
    volumes:
      - piston_data:/piston

  backend:
    build:
      context: ./backend
    container_name: ats_genai_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/ats_genai
      - MONGO_DB=${MONGO_DB}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SPACY_MODEL=${SPACY_MODEL}
      - SENTENCE_TRANSFORMER_MODEL=${SENTENCE_TRANSFORMER_MODEL}
      - PISTON_API_URL=http://piston:2000/api/v2
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - piston

  frontend:
    build:
      context: ./frontend
    container_name: ats_genai_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=${FRONTEND_API_BASE_URL}
      - VITE_API_PROXY_TARGET=http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
  piston_data:
